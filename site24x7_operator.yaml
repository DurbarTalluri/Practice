apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: site24x7-operator
value: 12000000
---
apiVersion: v1
kind: Service
metadata:
  name: site24x7-operator
  namespace: site24x7
spec:
  selector:
    app: site24x7-operator
  ports:
    - port: 443
      targetPort: tls
      name: application
    - port: 80
      targetPort: metrics
      name: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: site24x7-operator
  namespace: site24x7
  labels:
    app: site24x7-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: site24x7-operator
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: site24x7-operator
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        kubernetes.io/arch: "amd64"
      serviceAccountName: site24x7-operator
      #Default Toleration
      tolerations:
        - operator: Exists
      priorityClassName: site24x7-operator
      imagePullSecrets:
      - name: docker-registry-secret
      containers:
      - name: site24x7-operator
        image: durbar99/site24x7-operator:v1.0.0
        args:
          - operator
          - namespace=site24x7
        securityContext:
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001010001
        # IfNotPresent
        imagePullPolicy: Always
        ports:
        - containerPort: 9443
          name: tls
        - containerPort: 80
          name: metrics
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 50Mi
          limits:
            cpu: 300m
            memory: 150Mi
        volumeMounts:
        - name: webhook-certs
          mountPath: /etc/webhook
      volumes:
      - name: webhook-certs
        emptyDir: {}  
